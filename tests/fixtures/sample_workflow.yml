name: Fetch Guitar Chords

on:
  schedule:
    - cron: '0 */6 * * *'
  repository_dispatch:
    types: [update]
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch chords data
        run: |
          python scripts/fetch_chords.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update chords data"
          file_pattern: "data/latest.json"
